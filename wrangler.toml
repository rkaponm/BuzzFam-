# Cloudflare Pages configuration for the BuzzFam Advertising site.
# This is a static Astro build, so no runtime/adapter is required —
# Pages serves the prerendered `dist/` directory directly.
#
# Dashboard build settings (Pages → Connect to Git) should match:
#   Build command:       npm run build
#   Build output dir:    dist
#   Framework preset:    Astro
name = "buzzfam"
compatibility_date = "2026-06-30"
pages_build_output_dir = "dist"
